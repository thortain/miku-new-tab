<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Miku New Tab</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Nunito:wght@400;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --miku-cyan: #39FFDC;  /* Miku teal */
      --miku-lime:  #B8FF00;  /* Miku hair highlight */
      --miku-pink: #FF66CC;
      --miku-purple: #9D4EDD;
      --miku-dark: #0a0a1a;
      --miku-darker: #050510;
      --glass-bg: rgba(5, 15, 35, 0.70);
      --glass-border: rgba(57, 255, 220, 0.25);
      --text-glow: 0 0 10px var(--miku-cyan), 0 0 25px rgba(57, 255, 220, 0.4);
    }

    body {
      min-height: 100vh;
      background: var(--miku-darker);
      font-family: 'Quicksand', 'Nunito', sans-serif;
      overflow: hidden;
      position: relative;
    }

    .bg-layer {
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse at 50% 100%, rgba(0, 80, 200, 0.70) 0%, rgba(0, 120, 255, 0.35) 40%, transparent 65%),
        radial-gradient(ellipse at 80% 20%, rgba(57, 255, 220, 0.85) 0%, rgba(0, 150, 255, 0.40) 50%, transparent 70%),
        radial-gradient(ellipse at 30% 30%, rgba(0, 100, 255, 0.15) 0%, transparent 60%),
        linear-gradient(180deg, #010818 0%, #020c24 50%, #041030 100%);
      z-index: 0;
    }

    .bg-image {
      position: fixed;
      inset: 0;
      background: url('miku-bg.png') center/cover no-repeat;
      opacity: 0.75;
      z-index: 1;
      mask-image: radial-gradient(ellipse at 50% 60%, black 35%, transparent 75%);
      -webkit-mask-image: radial-gradient(ellipse at 50% 60%, black 35%, transparent 75%);
    }

    /* ---- Miku Decals ---- */
    .decals { position: fixed; inset: 0; z-index: 2; pointer-events: none; overflow: hidden; }

    /* Floating music notes */
    .decal-note {
      position: absolute; opacity: 0.18; font-size: 2rem; user-select: none;
      animation: drift 20s ease-in-out infinite; color: var(--miku-cyan);
    }
    .decal-note:nth-child(odd)  { color: var(--miku-pink); animation-duration: 25s; }
    .decal-note:nth-child(3n)   { color: var(--miku-lime); opacity: 0.12; font-size: 1.5rem; }
    @keyframes drift {
      0%,100% { transform: translateY(0) rotate(0deg); }
      50%      { transform: translateY(-25px) rotate(8deg); }
    }

    /* Spinning ring top-right */
    .decal-ring-1 {
      position: absolute; top: 8%; right: 4%;
      width: 140px; height: 140px;
      border: 2px solid rgba(57,255,220,0.18); border-radius: 50%;
      animation: spin-slow 35s linear infinite;
      display: flex; align-items: center; justify-content: center;
    }
    .decal-ring-1::before { content: '♪'; font-size: 3.5rem; color: rgba(57,255,220,0.2); }
    .ring-inner {
      position: absolute; width: 90px; height: 90px;
      border: 1px solid rgba(255,102,204,0.15); border-radius: 50%;
      animation: spin-reverse 22s linear infinite;
    }
    @keyframes spin-slow   { from{transform:rotate(0deg);}   to{transform:rotate(360deg);} }
    @keyframes spin-reverse { from{transform:rotate(360deg);} to{transform:rotate(0deg);} }

    /* Headphones left */
    .decal-h-l {
      position: absolute; top: 38%; left: 3%;
      transform: rotate(-15deg); opacity: 0.15;
    }
    .hp-band { width: 90px; height: 45px; border: 3px solid var(--miku-cyan); border-bottom: none; border-radius: 50% 50% 0 0; }
    .hp-cup { position: absolute; width: 28px; height: 36px; background: rgba(57,255,220,0.3); border: 2px solid var(--miku-cyan); border-radius: 6px; top: 38px; }
    .hp-cup-l { left: 0; } .hp-cup-r { right: 0; }

    /* Vinyl record right */
    .decal-v-r {
      position: absolute; top: 58%; right: 5%;
      width: 100px; height: 100px; border-radius: 50%;
      background: radial-gradient(circle, rgba(57,255,220,0.25) 0%, rgba(57,255,220,0.05) 40%, rgba(255,255,255,0.08) 60%, transparent 70%);
      border: 2px solid rgba(57,255,220,0.2);
      animation: spin-slow 8s linear infinite; display: flex; align-items: center; justify-content: center;
    }
    .vinyl-label { width: 30px; height: 30px; border-radius: 50%; background: rgba(255,102,204,0.35); border: 1px solid rgba(255,102,204,0.4); }
    .vinyl-groove { position: absolute; width: 70px; height: 70px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.06); }

    /* Sound bars left */
    .decal-sb-l {
      position: absolute; top: 75%; left: 5%;
      display: flex; gap: 5px; align-items: flex-end; opacity: 0.18;
    }
    .sb-bar { width: 7px; border-radius: 4px; background: var(--miku-cyan);
      animation: bounce 1.2s ease-in-out infinite;
    }
    .sb-bar:nth-child(1){height:22px;animation-delay:0s;}
    .sb-bar:nth-child(2){height:38px;animation-delay:0.15s;}
    .sb-bar:nth-child(3){height:28px;animation-delay:0.3s;}
    .sb-bar:nth-child(4){height:45px;animation-delay:0.45s;}
    .sb-bar:nth-child(5){height:18px;animation-delay:0.6s;}

    /* Equalizer bars right */
    .decal-eq-r {
      position: absolute; top: 72%; right: 8%;
      display: flex; gap: 4px; align-items: flex-end; opacity: 0.18; flex-direction: row-reverse;
    }
    .eq-bar { width: 6px; border-radius: 3px; background: var(--miku-pink);
      animation: bounce 0.9s ease-in-out infinite;
    }
    .eq-bar:nth-child(1){height:30px;animation-delay:0s;}
    .eq-bar:nth-child(2){height:50px;animation-delay:0.1s;}
    .eq-bar:nth-child(3){height:20px;animation-delay:0.2s;}
    .eq-bar:nth-child(4){height:42px;animation-delay:0.3s;}
    .eq-bar:nth-child(5){height:16px;animation-delay:0.5s;}
    @keyframes bounce { 0%,100%{transform:scaleY(0.4)} 50%{transform:scaleY(1)} }


    .particles {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: var(--miku-cyan);
      border-radius: 50%;
      animation: float 8s ease-in-out infinite;
      opacity: 0.6;
    }

    .particle:nth-child(odd) {
      background: var(--miku-pink);
      animation-duration: 10s;
    }

    .particle:nth-child(3n) {
      background: white;
      width: 2px;
      height: 2px;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0.6; }
      25% { transform: translateY(-30px) translateX(10px) rotate(90deg); opacity: 0.8; }
      50% { transform: translateY(-15px) translateX(-15px) rotate(180deg); opacity: 0.4; }
      75% { transform: translateY(-40px) translateX(5px) rotate(270deg); opacity: 0.7; }
    }


    /* ---- Liquid Glass Panel ---- */
    .liquid-glass {
      position: fixed;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      background: rgba(5, 10, 25, 0.45);
      backdrop-filter: blur(7px) saturate(160%);
      -webkit-backdrop-filter: blur(7px) saturate(160%);
      border: 1px solid rgba(57, 255, 220, 0.18);
      border-radius: 0;
      box-shadow:
        inset 0 0 80px rgba(0, 0, 0, 0.5),
        inset 6px 0 30px rgba(57, 255, 220, 0.06),
        inset -6px 0 30px rgba(57, 255, 220, 0.06),
        0 0 0 4px rgba(5, 10, 25, 0.25);
    }

    /* Subtle glass sheen — diagonal highlight */
    .liquid-glass::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        125deg,
        rgba(255,255,255,0.06) 0%,
        rgba(255,255,255,0.02) 30%,
        transparent 60%,
        rgba(57,255,220,0.03) 100%
      );
      pointer-events: none;
    }

    /* Bottom edge shimmer */
    .liquid-glass::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(57,255,220,0.25),
        rgba(57,255,220,0.08),
        transparent
      );
      pointer-events: none;
    }

    .music-bars {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 4px;
      align-items: flex-end;
      z-index: 10;
    }

    .bar {
      width: 6px;
      background: linear-gradient(to top, var(--miku-cyan), var(--miku-pink));
      border-radius: 3px;
      animation: bounce 1s ease-in-out infinite;
      box-shadow: 0 0 8px var(--miku-cyan);
    }

    .bar:nth-child(1) { height: 20px; animation-delay: 0s; }
    .bar:nth-child(2) { height: 35px; animation-delay: 0.1s; }
    .bar:nth-child(3) { height: 25px; animation-delay: 0.2s; }
    .bar:nth-child(4) { height: 40px; animation-delay: 0.3s; }
    .bar:nth-child(5) { height: 30px; animation-delay: 0.4s; }
    .bar:nth-child(6) { height: 45px; animation-delay: 0.5s; }
    .bar:nth-child(7) { height: 20px; animation-delay: 0.6s; }
    .bar:nth-child(8) { height: 35px; animation-delay: 0.7s; }

    @keyframes bounce {
      0%, 100% { transform: scaleY(0.5); }
      50% { transform: scaleY(1); }
    }

    .container {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    /* ---- Clock Widget ---- */
    .clock-widget {
      text-align: center;
      margin-bottom: 20px;
    }

    .time {
      font-size: 5rem;
      font-weight: 700;
      color: white;
      text-shadow: var(--text-glow);
      letter-spacing: 4px;
      animation: pulse-glow 3s ease-in-out infinite;
    }

    .date {
      font-size: 1.4rem;
      color: var(--miku-cyan);
      text-shadow: 0 0 8px var(--miku-cyan);
      margin-top: 5px;
      letter-spacing: 2px;
    }

    @keyframes pulse-glow {
      0%, 100% { text-shadow: var(--text-glow); }
      50% { text-shadow: 0 0 20px var(--miku-cyan), 0 0 40px var(--miku-cyan), 0 0 60px rgba(57, 255, 220, 0.5); }
    }

    /* ---- Search Bar ---- */
    .search-container {
      width: 100%;
      max-width: 600px;
      margin-bottom: 50px;
    }

    .search-box {
      position: relative;
      width: 100%;
    }

    .search-input {
      width: 100%;
      padding: 16px 60px 16px 24px;
      font-size: 1.1rem;
      font-family: 'Quicksand', sans-serif;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 50px;
      color: white;
      outline: none;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }

    .search-input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    .search-input:focus {
      border-color: var(--miku-cyan);
      box-shadow: 0 0 20px rgba(0, 229, 255, 0.3), inset 0 0 10px rgba(0, 229, 255, 0.1);
    }

    .search-icon {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.2rem;
      color: var(--miku-cyan);
    }

    /* ---- Widget Canvas ---- */
    #widget-canvas {
      position: relative;
      width: 100%;
      min-height: 100vh;
      overflow: hidden;
    }

    .widget-card {
      position: absolute;
      background: rgba(5, 15, 35, 0.72);
      border: 1px solid rgba(57, 255, 220, 0.22);
      border-radius: 16px;
      padding: 16px;
      min-width: 200px;
      min-height: 120px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: box-shadow 0.2s, border-color 0.2s;
      z-index: 10;
      user-select: none;
    }
    .widget-card:hover { box-shadow: 0 0 25px rgba(57, 255, 220, 0.18); }
    .widget-card.edit-mode { border: 1px dashed rgba(57, 255, 220, 0.55); }
    .widget-card.dragging { cursor: grabbing; box-shadow: 0 12px 50px rgba(0,0,0,0.6),0 0 30px rgba(57,255,220,0.2); z-index: 999; opacity: 0.93; border-color: rgba(57,255,220,0.7); }
    .widget-card.pinned .widget-drag-handle { opacity: 0.2 !important; cursor: default !important; }
    .pin-indicator { position: absolute; top: 8px; left: 10px; font-size: 0.7rem; opacity: 0; color: var(--miku-lime); transition: opacity 0.2s; pointer-events: none; }
    .widget-card.pinned .pin-indicator { opacity: 1; }
    .widget-controls { display: none; align-items: center; gap: 5px; position: absolute; top: 7px; right: 7px; }
    .edit-mode .widget-controls { display: flex; }
    .widget-drag-handle { font-size: 0.8rem; color: rgba(57,255,220,0.4); cursor: grab; user-select: none; line-height: 1; transition: color 0.2s; }
    .widget-drag-handle:hover { color: var(--miku-cyan); }
    .widget-pin-btn { font-size: 0.85rem; cursor: pointer; opacity: 0; transition: opacity 0.2s, transform 0.2s; line-height: 1; }
    .widget-pin-btn:hover { transform: scale(1.2); }
    .widget-pin-btn.pinned { opacity: 1; }
    .widget-remove-btn { width: 20px; height: 20px; border-radius: 50%; background: rgba(255,77,109,0.12); border: 1px solid rgba(255,77,109,0.3); color: rgba(255,100,100,0.7); font-size: 0.9rem; line-height: 1; text-align: center; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; padding: 0; }
    .widget-remove-btn:hover { background: #ff4d6d; color: white; border-color: #ff4d6d; }
    .widget-title-bar { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 2px; color: var(--miku-pink); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; pointer-events: none; }
    .widget-title-bar::before { content: '♪'; color: var(--miku-cyan); }
    .widget-body { pointer-events: auto; }

    /* ---- Top Bar ---- */
    .top-bar { display: flex; gap: 10px; margin-bottom: 12px; opacity: 0.75; transition: opacity 0.2s; }
    .top-bar:hover { opacity: 1; }
    .top-btn { padding: 7px 16px; border-radius: 20px; border: 1px solid rgba(57,255,220,0.3); background: rgba(5,15,35,0.6); color: var(--miku-cyan); font-family: 'Quicksand',sans-serif; font-size: 0.82rem; font-weight: 600; cursor: pointer; backdrop-filter: blur(8px); transition: all 0.2s; letter-spacing: 0.5px; }
    .top-btn:hover { background: rgba(57,255,220,0.15); border-color: var(--miku-cyan); box-shadow: 0 0 14px rgba(57,255,220,0.25); }
    .top-btn.active { background: rgba(255,102,204,0.2); color: var(--miku-pink); border-color: rgba(255,102,204,0.5); }

    /* ---- Add Widget Modal ---- */
    #add-widget-modal { display: none; position: fixed; inset: 0; background: rgba(5,10,25,0.75); backdrop-filter: blur(8px); z-index: 2000; align-items: center; justify-content: center; }
    #add-widget-modal.open { display: flex; }
    .modal-box { background: rgba(5,12,30,0.95); border: 1px solid rgba(57,255,220,0.2); border-radius: 20px; padding: 24px; max-width: 480px; width: 90%; max-height: 80vh; overflow-y: auto; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .modal-header h2 { font-size: 1rem; font-weight: 700; color: var(--miku-cyan); letter-spacing: 1px; }
    .modal-close { width: 28px; height: 28px; border-radius: 50%; border: 1px solid rgba(255,100,100,0.3); background: rgba(255,77,109,0.1); color: rgba(255,100,100,0.7); font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; padding: 0; }
    .modal-close:hover { background: #ff4d6d; color: white; border-color: #ff4d6d; }
    .modal-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .modal-opt { background: rgba(57,255,220,0.05); border: 1px solid rgba(57,255,220,0.12); border-radius: 12px; padding: 12px; cursor: pointer; transition: all 0.2s; text-align: left; }
    .modal-opt:hover { background: rgba(57,255,220,0.12); border-color: rgba(57,255,220,0.4); box-shadow: 0 0 12px rgba(57,255,220,0.15); transform: translateY(-1px); }
    .modal-opt.existing { opacity: 0.45; cursor: not-allowed; }
    .modal-opt.existing:hover { transform: none; box-shadow: none; }
    .modal-opt-icon { font-size: 1.2rem; margin-bottom: 4px; }
    .modal-opt-name { font-size: 0.85rem; font-weight: 600; margin-bottom: 2px; }
    .modal-opt-desc { font-size: 0.7rem; color: rgba(255,255,255,0.4); }

    /* ---- Widget internals ---- */
    .quick-links { display: flex; flex-direction: column; gap: 6px; }
    .quick-link { display: flex; align-items: center; gap: 8px; padding: 6px 10px; background: rgba(57,255,220,0.07); border-radius: 8px; color: white; text-decoration: none; font-size: 0.88rem; transition: all 0.2s; position: relative; }
    .quick-link:hover { background: rgba(57,255,220,0.15); padding-left: 13px; }
    .quick-link .favicon { width: 16px; height: 16px; border-radius: 4px; background: var(--miku-purple); display: flex; align-items: center; justify-content: center; font-size: 0.65rem; flex-shrink: 0; }
    .quick-link .remove-btn { position: absolute; right: 6px; opacity: 0; color: rgba(255,100,100,0.5); font-size: 0.8rem; cursor: pointer; transition: all 0.2s; }
    .quick-link:hover .remove-btn { opacity: 1; }
    .quick-link:hover .remove-btn:hover { color: #ff6464; }
    .add-link-form { display: flex; gap: 5px; margin-top: 6px; }
    .add-link-input { padding: 5px 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(57,255,220,0.15); border-radius: 6px; color: white; font-family: 'Quicksand',sans-serif; font-size: 0.78rem; outline: none; transition: border-color 0.2s; }
    .add-link-input:nth-child(1) { flex: 1; }
    .add-link-input:nth-child(2) { flex: 2; }
    .add-link-input:focus { border-color: var(--miku-cyan); }
    .add-link-input::placeholder { color: rgba(255,255,255,0.3); }
    .add-link-btn { width: 28px; height: 28px; flex-shrink: 0; background: rgba(57,255,220,0.12); border: 1px solid rgba(57,255,220,0.25); border-radius: 6px; color: var(--miku-cyan); font-size: 0.95rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; padding: 0; }
    .add-link-btn:hover { background: var(--miku-cyan); color: var(--miku-dark); }
    .weather-widget { text-align: center; }
    .weather-icon { font-size: 2rem; margin-bottom: 4px; }
    .weather-temp { font-size: 1.8rem; font-weight: 700; color: white; }
    .weather-desc { font-size: 0.82rem; color: rgba(255,255,255,0.6); margin-top: 2px; }
    .system-stats { display: flex; flex-direction: column; gap: 8px; }
    .stat-row { display: flex; justify-content: space-between; align-items: center; }
    .stat-label { color: rgba(255,255,255,0.65); font-size: 0.85rem; }
    .stat-value { color: var(--miku-cyan); font-weight: 600; font-size: 0.85rem; }
    .progress-bar { width: 100%; height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--miku-cyan), var(--miku-pink)); border-radius: 2px; transition: width 0.5s; }
    .pomodoro-display { text-align: center; }
    .pomo-time { font-size: 2rem; font-weight: 700; color: white; text-shadow: var(--text-glow); }
    .pomo-buttons { display: flex; gap: 8px; justify-content: center; margin-top: 8px; }
    .pomo-btn { padding: 5px 12px; border: 1px solid rgba(57,255,220,0.25); background: rgba(57,255,220,0.08); color: var(--miku-cyan); border-radius: 20px; font-family: 'Quicksand',sans-serif; font-size: 0.8rem; cursor: pointer; transition: all 0.2s; }
    .pomo-btn:hover { background: var(--miku-cyan); color: var(--miku-dark); }
    .notes-input { width: 100%; min-height: 80px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 8px; color: white; font-family: 'Quicksand',sans-serif; font-size: 0.85rem; resize: vertical; outline: none; transition: border-color 0.2s; }
    .notes-input:focus { border-color: var(--miku-cyan); }
    .notes-input::placeholder { color: rgba(255,255,255,0.3); }
    .song-widget { text-align: center; }
    .song-title { color: white; font-weight: 600; font-size: 0.9rem; }
    .song-artist { color: var(--miku-pink); font-size: 0.8rem; margin-top: 3px; }
    .visualizer { display: flex; justify-content: center; gap: 3px; margin-top: 8px; }
    .viz-bar { width: 4px; background: linear-gradient(to top, var(--miku-purple), var(--miku-cyan)); border-radius: 2px; animation: viz-dance 0.8s ease-in-out infinite alternate; }
    .viz-bar:nth-child(1){height:12px;animation-delay:0s;}
    .viz-bar:nth-child(2){height:20px;animation-delay:0.1s;}
    .viz-bar:nth-child(3){height:8px;animation-delay:0.2s;}
    .viz-bar:nth-child(4){height:16px;animation-delay:0.3s;}
    .viz-bar:nth-child(5){height:24px;animation-delay:0.4s;}
    @keyframes viz-dance { from{transform:scaleY(0.4)} to{transform:scaleY(1)} }
    .countdown-display { text-align: center; }
    .countdown-time { font-size: 1.8rem; font-weight: 700; color: white; text-shadow: var(--text-glow); }
    .countdown-label { font-size: 0.7rem; color: rgba(255,255,255,0.4); letter-spacing: 1px; margin-top: 2px; }
    .countdown-inputs { display: flex; gap: 5px; justify-content: center; margin-top: 8px; flex-wrap: wrap; }
    .countdown-inputs input { width: 48px; padding: 4px 3px; text-align: center; background: rgba(255,255,255,0.06); border: 1px solid rgba(57,255,220,0.2); border-radius: 5px; color: white; font-family: 'Quicksand',sans-serif; font-size: 0.78rem; outline: none; }
    .countdown-inputs input:focus { border-color: var(--miku-cyan); }
    .countdown-buttons { display: flex; gap: 6px; justify-content: center; margin-top: 7px; }
    .countdown-btn { padding: 4px 11px; border: 1px solid rgba(57,255,220,0.2); background: rgba(57,255,220,0.07); color: var(--miku-cyan); border-radius: 20px; font-family: 'Quicksand',sans-serif; font-size: 0.78rem; cursor: pointer; transition: all 0.2s; }
    .countdown-btn:hover { background: var(--miku-cyan); color: var(--miku-dark); }
    .ticker-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
    .ticker-name { font-size: 0.85rem; color: rgba(255,255,255,0.7); font-weight: 600; }
    .ticker-price { font-size: 0.85rem; color: var(--miku-cyan); font-weight: 600; }
    .ticker-change { font-size: 0.75rem; margin-left: 5px; }
    .ticker-change.up { color: #4ade80; }
    .ticker-change.down { color: #f87171; }
    .wloading { font-size: 0.8rem; color: rgba(255,255,255,0.35); }
    .werror { font-size: 0.75rem; color: rgba(255,100,100,0.6); }
    .stack { display: flex; flex-direction: column; gap: 3px; }
    .wtitle { font-size: 0.95rem; font-weight: 600; }
    .wsub { font-size: 0.72rem; color: rgba(255,255,255,0.5); }
    .wacc  { color: var(--miku-cyan); }
    .wacc2 { color: var(--miku-pink); }
    .wacc3 { color: var(--miku-lime); }
    .news-item { text-align: left; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 0.78rem; line-height: 1.3; }
    .news-item:last-child { border-bottom: none; }
    .news-item a { color: var(--miku-cyan); text-decoration: none; }
    .news-item a:hover { text-decoration: underline; }
    /* ---- Footer ---- */
    .footer {
      position: fixed;
      bottom: 10px;
      right: 20px;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.3);
      z-index: 10;
    }

    .footer a {
      color: var(--miku-pink);
      text-decoration: none;
    }

    /* ---- Scrollbar ---- */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--miku-purple);
      border-radius: 3px;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .time { font-size: 3.5rem; }
      .widgets-grid { grid-template-columns: 1fr 1fr; }
      .container { padding: 20px 15px; }
    }
  </style>
</head>

    </div>
  </div>

  <script>
    /* WIDGET REGISTRY */
    const WIDGET_REGISTRY = {
      quicklinks: {
        name: 'Quick Links', icon: '🔗', unique: true,
        render: (el) => {
          const FAV={'youtube.com':'▶','youtu.be':'▶','twitch.tv':'📺','twitter.com':'𝕏','x.com':'𝕏','reddit.com':'r','old.reddit.com':'r','github.com':'◈','gitlab.com':'◈','discord.com':'💬','discord.gg':'💬','spotify.com':'♫','soundcloud.com':'☁','netflix.com':'🎬','store.steampowered.com':'🎮','chat.openai.com':'🤖','claude.ai':'🤖','default':'🔗'};
          const DEFAULTS=[{name:'YouTube',url:'https://youtube.com'},{name:'Twitter / X',url:'https://x.com'},{name:'Reddit',url:'https://reddit.com'},{name:'GitHub',url:'https://github.com'}];
          function gf(u){try{const h=new URL(u.startsWith('http')?u:'http://'+u).hostname;for(const k of Object.keys(FAV))if(h.includes(k))return FAV[k];return FAV.default}catch{return FAV.default}}
          function load(){return JSON.parse(localStorage.getItem('miku-links')||'null')||DEFAULTS}
          function save(l){localStorage.setItem('miku-links',JSON.stringify(l))}
          function render(){el.querySelector('.ql-links').innerHTML='';load().forEach((l,i)=>{const a=document.createElement('a');a.className='quick-link';a.href=l.url;a.target='_blank';a.innerHTML='<span class="favicon">'+gf(l.url)+'</span>'+l.name+'<span class="remove-btn" data-i="'+i+'">×</span>';el.querySelector('.ql-links').appendChild(a)});el.querySelectorAll('.ql-links .remove-btn').forEach(b=>{b.onclick=e=>{e.preventDefault();e.stopPropagation();const l=load();l.splice(+b.dataset.i,1);save(l);render()}})}
          el.innerHTML='<div class="ql-links"></div><div class="add-link-form"><input class="add-link-input" id="ql-name" placeholder="Name" maxlength=24><input class="add-link-input" id="ql-url" placeholder="URL" maxlength=500><button class="add-link-btn" id="ql-add">+</button></div>';
          el.querySelector('#ql-add').onclick=()=>{const n=el.querySelector('#ql-name').value.trim();let u=el.querySelector('#ql-url').value.trim();if(!u)return;if(!u.match(/^https?:\/\//i))u='https://'+u;const l=load();l.push({name:n||new URL(u).hostname,url:u});save(l);el.querySelector('#ql-name').value='';el.querySelector('#ql-url').value='';render()};
          el.querySelector('#ql-url').onkeydown=e=>{if(e.key==='Enter')el.querySelector('#ql-add').click()};
          render();
        }
      },
      weather: {
        name: 'Weather', icon: '🌤️', unique: true,
        render: async (el) => {
          el.innerHTML='<div class="weather-widget"><div class="weather-icon" id="wIcon">🌤️</div><div class="weather-temp" id="wTemp">--°</div><div class="weather-desc" id="wDesc">Loading...</div></div>';
          try{const r=await fetch('https://wttr.in/?format=j1');const d=await r.json();const c=d.current_condition[0];const icons={'sun':'☀️','clear':'☀️','cloud':'⛅','rain':'🌧️','snow':'❄️','thunder':'⛈️','fog':'🌫️','mist':'🌫️'};let ico='🌤️';const wd=c.weatherDesc[0].value.toLowerCase();for(const k of Object.keys(icons))if(wd.includes(k)){ico=icons[k];break}el.querySelector('#wIcon').textContent=ico;el.querySelector('#wTemp').textContent=c.temp_C+'°C';el.querySelector('#wDesc').textContent=c.weatherDesc[0].value}catch{el.querySelector('#wDesc').textContent='Unavailable'}
        }
      },
      system: {
        name: 'System', icon: '💻', unique: true,
        render: (el) => {
          el.innerHTML='<div class="system-stats"><div class="stat-row"><span class="stat-label">CPU</span><span class="stat-value" id="wCpu">--%</span></div><div class="progress-bar"><div class="progress-fill" id="wCpuBar" style="width:0%"></div></div><div class="stat-row"><span class="stat-label">Memory</span><span class="stat-value" id="wMem">--%</span></div><div class="progress-bar"><div class="progress-fill" id="wMemBar" style="width:0%"></div></div></div>';
          const u=()=>{if(navigator.hardwareConcurrency){const v=Math.round(Math.random()*30+10);el.querySelector('#wCpu').textContent='~'+v+'%';el.querySelector('#wCpuBar').style.width=v+'%'}if(navigator.deviceMemory){const v=Math.round(Math.random()*40+20);el.querySelector('#wMem').textContent=v+'%';el.querySelector('#wMemBar').style.width=v+'%'}};
          u();setInterval(u,30000);
        }
      },
      pomodoro: {
        name: 'Pomodoro', icon: '🍅', unique: true,
        render: (el) => {
          el.innerHTML='<div class="pomodoro-display"><div class="pomo-time" id="pTime">25:00</div><div class="pomo-buttons"><button class="pomo-btn" id="pStart">Start</button><button class="pomo-btn" id="pReset">Reset</button></div></div>';
          const pom={dur:1500,rem:1500,iv:null,run:false};
          const tick=()=>{pom.rem--;const m=Math.floor(pom.rem/60),s=pom.rem%60;el.querySelector('#pTime').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(pom.rem<=0){pom.run=false;pom.rem=pom.dur;clearInterval(pom.iv);pom.iv=null;el.querySelector('#pStart').textContent='Start'}};
          el.querySelector('#pStart').onclick=()=>{if(pom.run){clearInterval(pom.iv);pom.run=false;pom.iv=null;el.querySelector('#pStart').textContent='Resume'}else{pom.run=true;el.querySelector('#pStart').textContent='Pause';pom.iv=setInterval(tick,1000)}};
          el.querySelector('#pReset').onclick=()=>{clearInterval(pom.iv);pom.run=false;pom.iv=null;pom.rem=pom.dur;el.querySelector('#pTime').textContent='25:00';el.querySelector('#pStart').textContent='Start'};
        }
      },
      notes: { name: 'Quick Notes', icon: '📝', unique: true, render:(el)=>{el.innerHTML='<textarea class="notes-input" id="wNotes" placeholder="Jot down ideas..."></textarea>';const ta=el.querySelector('#wNotes');ta.value=localStorage.getItem('miku-notes')||'';ta.oninput=()=>localStorage.setItem('miku-notes',ta.value)}},
      nowplaying: { name: 'Now Playing', icon: '🎵', unique: true, render:(el)=>{el.innerHTML='<div class="song-widget"><div class="song-title">World is Mine</div><div class="song-artist">Hatsune Miku</div><div class="visualizer"><div class="viz-bar"></div><div class="viz-bar"></div><div class="viz-bar"></div><div class="viz-bar"></div><div class="viz-bar"></div></div></div>'}},
      countdown: {
        name: 'Countdown', icon: '⏰', unique: true,
        render:(el)=>{
          el.innerHTML='<div class="countdown-display"><div class="countdown-time" id="cdT">--:--:--</div><div class="countdown-label" id="cdL">SET A DATE</div><div class="countdown-inputs"><input id="cdMo" placeholder="MM" type=number min=1 max=12><input id="cdD" placeholder="DD" type=number min=1 max=31><input id="cdH" placeholder="HH" type=number min=0 max=23><input id="cdMn" placeholder="MM" type=number min=0 max=59></div><div class="countdown-buttons"><button class="countdown-btn" id="cdSet">Set</button><button class="countdown-btn" id="cdClr">Clear</button></div></div>';
          let target=null,iv=null;
          const tick=()=>{if(!target){el.querySelector('#cdT').textContent='--:--:--';el.querySelector('#cdL').textContent='SET A DATE';return}const diff=target-Date.now();if(diff<=0){el.querySelector('#cdT').textContent='00:00:00';el.querySelector('#cdL').textContent="IT'S TIME!";clearInterval(iv);return}const s=Math.floor(diff/1000),h=Math.floor(s/3600),m=Math.floor(s%3600/60),sec=s%60;el.querySelector('#cdT').textContent=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');const d=Math.ceil(diff/86400000);el.querySelector('#cdL').textContent=d===1?'TOMORROW':d+' DAYS'};
          const st=localStorage.getItem('miku-cd');if(st){target=new Date(st);iv=setInterval(tick,1000)}tick();
          el.querySelector('#cdSet').onclick=()=>{const mo=el.querySelector('#cdMo').value,d=el.querySelector('#cdD').value,h=el.querySelector('#cdH').value,mn=el.querySelector('#cdMn').value;if(!mo||!d)return;const now=new Date();target=new Date(now.getFullYear(),parseInt(mo)-1,parseInt(d),parseInt(h)||0,parseInt(mn)||0);if(target<now)target.setFullYear(now.getFullYear()+1);localStorage.setItem('miku-cd',target.toISOString());if(!iv)iv=setInterval(tick,1000);tick()};
          el.querySelector('#cdClr').onclick=()=>{target=null;clearInterval(iv);iv=null;localStorage.removeItem('miku-cd');el.querySelector('#cdMo').value='';el.querySelector('#cdD').value='';el.querySelector('#cdH').value='';el.querySelector('#cdMn').value='';tick()};
        }
      },
      crypto: { name:'Crypto', icon:'💰', unique:true, render:async(el)=>{el.innerHTML='<div><span class="wloading">Loading...</span></div>';try{const r=await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=gbp&include_24hr_change=true');const d=await r.json();const row=(s,data)=>{if(!data)return'';const p='£'+data.gbp.toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:0});const c=(data.gbp_24h_change||0).toFixed(1);const cls=parseFloat(c)>=0?'up':'down';return'<div class="ticker-row"><span class="ticker-name">'+s+'</span><span><span class="ticker-price">'+p+'</span><span class="ticker-change '+cls+'">'+(parseFloat(c)>=0?'+':'')+c+'%</span></span></div>'};el.innerHTML='<div>'+row('BTC',d.bitcoin)+row('ETH',d.ethereum)+'</div>'}catch{el.innerHTML='<div><span class="werror">Unavailable</span></div>'}}},
      spell: { name:'D&D Spell', icon:'🔮', unique:false, render:async(el)=>{el.innerHTML='<div class="stack"><span class="wloading">Summoning...</span></div>';try{const id=Math.floor(Math.random()*300+1);const r=await fetch('https://www.dnd5eapi.co/api/spells/'+id);const d=await r.json();if(d.error)throw new Error();el.innerHTML='<div class="stack"><span class="wtitle wacc3">'+d.name+'</span><span class="wsub">'+(d.school?.name||'Unknown')+' · '+(d.casting_time||'?')+'</span><span class="wsub wacc">'+(d.level===0?'✨ Cantrip':'Lvl '+d.level)+'</span></div>'}catch{el.innerHTML='<div><span class="werror">Unavailable</span></div>'}}},
      joke: { name:'Random Joke', icon:'😄', unique:false, render:async(el)=>{el.innerHTML='<div class="stack"><span class="wloading">Loading...</span></div>';try{const r=await fetch('https://official-joke-api.appspot.com/jokes/random');const d=await r.json();el.innerHTML='<div class="stack"><span style="font-size:0.85rem">'+d.setup+'</span><span class="wacc2" style="font-weight:600;font-size:0.9rem">'+d.punchline+'</span></div>'}catch{el.innerHTML='<div><span class="werror">Unavailable</span></div>'}}},
      fact: { name:'Useless Fact', icon:'💡', unique:false, render:async(el)=>{el.innerHTML='<div class="stack"><span class="wloading">Thinking...</span></div>';try{const r=await fetch('https://uselessfacts.jsph.pl/api/v2/facts/random?language=en');const d=await r.json();el.innerHTML='<span style="font-size:0.82rem;line-height:1.4">'+d.text+'</span>'}catch{el.innerHTML='<div><span class="werror">Unavailable</span></div>'}}},
      currency: { name:'Currency', icon:'💱', unique:false, render:async(el)=>{el.innerHTML='<div class="stack"><span class="wloading">Fetching rates...</span></div>';try{const r=await fetch('https://api.frankfurter.app/latest?from=GBP');const d=await r.json();const{USD,JPY,EUR}=d.rates;el.innerHTML='<div class="stack"><span class="wtitle">💷 GBP</span><span class="wsub">🇺🇸 $'+USD.toFixed(2)+' &nbsp; 🇪🇺 €'+EUR.toFixed(2)+' &nbsp; 🇯🇵 ¥'+JPY.toFixed(0)+'</span></div>'}catch{el.innerHTML='<div><span class="werror">Unavailable</span></div>'}}},
      games: { name:'F2P Game', icon:'🕹️', unique:false, render:async(el)=>{el.innerHTML='<div class="stack"><span class="wloading">Loading...</span></div>';try{const r=await fetch('https://www.freetogame.com/api/games?sort-by=release-date&order=desc&limit=1');const[g]=await r.json();el.innerHTML='<div class="stack"><span class="wtitle wacc">'+g.title+'</span><span class="wsub">'+g.genre+' · '+g.platform+'</span>'+(g.game_url?'<span class="wsub wacc3">🌐 Browser game</span>':'')+'</div>'}catch{el.innerHTML='<div><span class="werror">Unavailable</span></div>'}}},
      monster: { name:'D&D Monster', icon:'👹', unique:false, render:async(el)=>{el.innerHTML='<div class="stack"><span class="wloading">Summoning beast...</span></div>';try{const id=Math.floor(Math.random()*300+1);const r=await fetch('https://www.dnd5eapi.co/api/monsters/'+id);const m=await r.json();if(m.error)throw new Error();const ac=m.armor_class?(m.armor_class[0]?.value??m.armor_class):'?';el.innerHTML='<div class="stack"><span class="wtitle wacc2">'+m.name+'</span><span class="wsub">⚔️ CR '+m.challenge_rating+' &nbsp; 🛡️ AC '+ac+' &nbsp; ❤️ HP '+m.hit_points+'</span><span class="wsub">'+m.size+' '+m.type+' · '+(m.alignment||'unaligned')+'</span></div>'}catch{el.innerHTML='<div><span class="werror">Unavailable</span></div>'}}},
      news: { name:'Hacker News', icon:'📡', unique:false, render:async(el)=>{el.innerHTML='<div class="stack"><span class="wloading">Loading...</span></div>';try{const r=await fetch('https://hacker-news.firebaseio.com/v0/topstories.json');const ids=await r.json();const top=ids.slice(0,5);const stories=await Promise.all(top.map(id=>fetch('https://hacker-news.firebaseio.com/v0/item/'+id+'.json').then(x=>x.json())));el.innerHTML=stories.map(s=>'<div class="news-item"><a href="'+(s.url||'https://news.ycombinator.com/item?id='+s.id)+'" target="_blank">'+s.title+'</a></div>').join('')}catch{el.innerHTML='<div><span class="werror">Unavailable</span></div>'}}}
    };

    const DEFAULT_LAYOUT=[
      {key:'quicklinks-1',id:'quicklinks',x:30,y:130,w:220,pinned:false},
      {key:'weather-1',id:'weather',x:280,y:130,w:210,pinned:false},
      {key:'system-1',id:'system',x:520,y:130,w:200,pinned:false},
      {key:'pomodoro-1',id:'pomodoro',x:30,y:370,w:200,pinned:false},
      {key:'notes-1',id:'notes',x:260,y:370,w:260,pinned:false},
      {key:'nowplaying-1',id:'nowplaying',x:550,y:370,w:220,pinned:false},
    ];

    function newWidgetKey(id){return (typeof crypto!=='undefined'&&crypto.randomUUID?crypto.randomUUID():id+'-'+Date.now()+'-'+Math.random().toString(16).slice(2))}
    function normalizeLayout(layout){
      const source=Array.isArray(layout)&&layout.length?layout:DEFAULT_LAYOUT;
      return source
        .filter(item=>item&&item.id&&WIDGET_REGISTRY[item.id])
        .map(item=>({
          key:item.key||newWidgetKey(item.id),
          id:item.id,
          x:Number.isFinite(item.x)?item.x:30,
          y:Number.isFinite(item.y)?item.y:130,
          w:Number.isFinite(item.w)?item.w:220,
          pinned:!!item.pinned
        }));
    }
    function loadLayout(){try{return normalizeLayout(JSON.parse(localStorage.getItem('miku-widget-layout')))}catch{return normalizeLayout(null)}}
    function saveLayout(layout){localStorage.setItem('miku-widget-layout',JSON.stringify(layout))}

    let editMode=false;
    const canvas=document.getElementById('widget-canvas');

    function renderWidgets(){
      canvas.innerHTML='';
      const layout=loadLayout();
      saveLayout(layout);
      layout.forEach(item=>{
        const def=WIDGET_REGISTRY[item.id];
        if(!def)return;
        const card=document.createElement('div');
        card.className='widget-card'+(editMode?' edit-mode':'')+(item.pinned?' pinned':'');
        card.dataset.widgetId=item.id;
        card.dataset.widgetKey=item.key;
        card.style.left=item.x+'px';
        card.style.top=item.y+'px';
        card.innerHTML='<span class="pin-indicator">📌</span>'+
          '<div class="widget-controls">'+
            '<span class="widget-drag-handle" title="Drag">⋮⋮</span>'+
            '<span class="widget-pin-btn'+(item.pinned?' pinned':'')+'" title="Pin">📌</span>'+
            '<span class="widget-remove-btn" title="Remove">×</span>'+
          '</div>'+
          '<div class="widget-title-bar">'+def.icon+' '+def.name+'</div>'+
          '<div class="widget-body"></div>';
        canvas.appendChild(card);
        const r=def.render(card.querySelector('.widget-body'));
        if(r&&typeof r.then==='function')r.catch(()=>{});
        card.querySelector('.widget-remove-btn').onclick=()=>{const lay=loadLayout();const idx=lay.findIndex(l=>l.key===item.key);if(idx!==-1){lay.splice(idx,1);saveLayout(lay)}card.remove()};
        card.querySelector('.widget-pin-btn').onclick=()=>{const lay=loadLayout();const entry=lay.find(l=>l.key===item.key);if(entry){entry.pinned=!entry.pinned;saveLayout(lay);card.classList.toggle('pinned',entry.pinned);card.querySelector('.widget-pin-btn').classList.toggle('pinned',entry.pinned)}};
        let drag=false,offX=0,offY=0;
        card.querySelector('.widget-drag-handle').onmousedown=e=>{const lay=loadLayout();const entry=lay.find(l=>l.key===item.key);if(entry&&entry.pinned)return;drag=true;card.classList.add('dragging');offX=e.clientX-card.offsetLeft;offY=e.clientY-card.offsetTop;e.preventDefault()};
        document.addEventListener('mousemove',e=>{if(!drag)return;card.style.left=(e.clientX-offX)+'px';card.style.top=(e.clientY-offY)+'px'});
        document.addEventListener('mouseup',()=>{if(!drag)return;drag=false;card.classList.remove('dragging');const lay=loadLayout();const entry=lay.find(l=>l.key===item.key);if(entry){entry.x=card.offsetLeft;entry.y=card.offsetTop;saveLayout(lay)}});
      });
    }

    document.getElementById('editModeBtn').onclick=()=>{editMode=!editMode;document.getElementById('editModeBtn').classList.toggle('active',editMode);document.getElementById('editModeBtn').textContent=editMode?'✓ Done':'✎ Edit';document.querySelectorAll('.widget-card').forEach(c=>c.classList.toggle('edit-mode',editMode))};
    document.getElementById('addWidgetBtn').onclick=openAddModal;
    document.getElementById('closeModalBtn').onclick=()=>document.getElementById('add-widget-modal').classList.remove('open');
    document.getElementById('add-widget-modal').onclick=e=>{if(e.target.id==='add-widget-modal')document.getElementById('add-widget-modal').classList.remove('open')};
    function openAddModal(){
      const modal=document.getElementById('add-widget-modal');
      const grid=document.getElementById('modalGrid');
      const layout=loadLayout();
      const activeIds=new Set(layout.map(l=>l.id));
      grid.innerHTML='';
      Object.entries(WIDGET_REGISTRY).forEach(([id,def])=>{
        const already=def.unique&&activeIds.has(id);
        const opt=document.createElement('div');
        opt.className='modal-opt'+(already?' existing':'');
        opt.innerHTML='<div class="modal-opt-icon">'+def.icon+'</div><div class="modal-opt-name">'+def.name+'</div><div class="modal-opt-desc">'+(already?'Added':'Click to add')+'</div>';
        if(!already)opt.onclick=()=>{const lay=loadLayout();const defaults={};DEFAULT_LAYOUT.forEach(d=>defaults[d.id]=d);const dp=defaults[id]||{x:30+(lay.length%4)*260,y:130+Math.floor(lay.length/4)*240,w:220};lay.push({key:newWidgetKey(id),id,x:dp.x,y:dp.y,w:dp.w||220,pinned:false});saveLayout(lay);modal.classList.remove('open');renderWidgets()};
        grid.appendChild(opt);
      });
      modal.classList.add('open');
    }

    /* PARTICLES */
    const particlesContainer=document.getElementById('particles');
    for(let i=0;i<40;i++){const p=document.createElement('div');p.className='particle';p.style.left=Math.random()*100+'%';p.style.top=Math.random()*100+'%';p.style.animationDelay=Math.random()*5+'s';particlesContainer.appendChild(p)}

    /* CLOCK */
    function updateClock(){const now=new Date();document.getElementById('clock').textContent=now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});document.getElementById('date').textContent=now.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'})}
    updateClock();setInterval(updateClock,1000);

    /* SEARCH */
    document.getElementById('searchInput').addEventListener('keydown',e=>{if(e.key==='Enter'){const q=e.target.value.trim();if(q){window.open('https://google.com/search?q='+encodeURIComponent(q),'_blank');e.target.value=''}}});

    /* INIT */
    renderWidgets();
</script>
</body>
</html>
